name: Build ObserverLib 1.20.1 Port

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.8'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        id: gradle_build
        run: |
          ./gradlew build --no-daemon --stacktrace 2>&1 | tee build_output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Commit build log to repo
        if: always()
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          # Keep only last 500 lines to stay under file size limits
          tail -500 build_output.txt > build_log.txt
          git add build_log.txt
          git diff --cached --quiet || git commit -m "ci: build log [skip ci]"
          git push origin main

      - name: Upload built jar
        if: steps.gradle_build.outputs.exit_code == '0'
        uses: actions/upload-artifact@v4
        with:
          name: observerlib-1.20.1
          path: build/libs/*.jar

      - name: Fail if build failed
        if: steps.gradle_build.outputs.exit_code != '0'
        run: exit 1
