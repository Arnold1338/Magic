name: Build ObserverLib 1.20.1 Port

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.8'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew build --no-daemon --stacktrace 2>&1 | tee build_output.txt; exit ${PIPESTATUS[0]}

      - name: Upload build log (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build_output.txt

      - name: Upload built jar
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: observerlib-1.20.1
          path: build/libs/*-1.20.1-*.jar
          if-no-files-found: warn
